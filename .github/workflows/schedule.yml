name: Systemic Asset Monitor

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码库
        uses: actions/checkout@v4
        
      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 部署执行环境
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests ccxt akshare
          
      - name: 触发跨市场监控引擎
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          python monitor.py
          
      - name: 自动归档周报至 GitHub
        run: |
          git config --global user.name "GitHub-Actions-Bot"
          git config --global user.email "actions@github.com"
          git add reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 归档自动生成的周报" && git push)
