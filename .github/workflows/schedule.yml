name: Systemic Asset Monitor

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码库
        uses: actions/checkout@v4
      
      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 注意：这里删除了 cache: 'pip'，彻底解除对外部文本文件的依赖
          
      - name: 部署执行环境
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests ccxt akshare
          
      - name: 触发跨市场监控引擎
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          python monitor.py
